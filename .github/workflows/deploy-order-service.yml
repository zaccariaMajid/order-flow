name: deploy-order-service

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to push and deploy. Defaults to the commit SHA."
        required: false
        type: string

concurrency:
  group: deploy-order-service
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: PROD

    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
      ECR_REPOSITORY: orderflow/order-service
      ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
      ECS_SERVICE: ${{ vars.ECS_SERVICE }}
      ECS_TASK_DEFINITION: ${{ vars.ECS_TASK_DEFINITION }}
      ECS_CONTAINER_NAME: ${{ vars.ECS_CONTAINER_NAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate AWS configuration
        shell: bash
        run: |
          test -n "$AWS_REGION" || (echo "AWS_REGION is empty" >&2; exit 1)
          test -n "$AWS_ACCOUNT_ID" || (echo "AWS_ACCOUNT_ID is empty" >&2; exit 1)
          test -n "$ECR_REPOSITORY" || (echo "ECR_REPOSITORY is empty" >&2; exit 1)

      - name: Resolve image tag
        id: image-tag
        env:
          REQUESTED_IMAGE_TAG: ${{ inputs.image_tag }}
          DEFAULT_IMAGE_TAG: ${{ github.sha }}
        shell: bash
        run: |
          image_tag="$REQUESTED_IMAGE_TAG"
          if [ -z "$image_tag" ]; then
            image_tag="$DEFAULT_IMAGE_TAG"
          fi

          if [ "$image_tag" = "latest" ]; then
            echo "The latest tag is not allowed for deployments." >&2
            exit 1
          fi

          if [[ ! "$image_tag" =~ ^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$ ]]; then
            echo "Image tag must be a valid Docker tag." >&2
            exit 1
          fi

          echo "value=$image_tag" >> "$GITHUB_OUTPUT"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore order-flow.slnx

      - name: Build
        run: dotnet build order-flow.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test order-flow.slnx --configuration Release --no-restore

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push OrderService image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.image-tag.outputs.value }}
        shell: bash
        run: |
          image="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

          docker build \
            --file services/OrderService/Dockerfile \
            --tag "$image" \
            .

          docker push "$image"
          echo "image=$image" >> "$GITHUB_OUTPUT"

      - name: Download ECS task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition "$ECS_TASK_DEFINITION" \
            --query taskDefinition \
            > task-definition.json

      - name: Render ECS task definition
        id: task-definition
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.ECS_CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-definition.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
